# ============================================================================
# 哨兵 Utility AI 决策参数配置
# ============================================================================
# 所有参数都可以在 launch 文件中覆盖，方便不同场景（仿真/实车）使用不同参数

utility_ai_node:
  ros__parameters:

    # --------------------------------------------------------------------------
    # 基础决策参数
    # --------------------------------------------------------------------------
    decision_rate_hz: 10.0          # 决策频率（Hz），10Hz 表示每秒计算 10 次决策
    switch_margin: 10.0             # 滞回防抖阈值
                                    # 新模式的分数必须超过当前模式分数 + 此值才会切换
                                    # 值越大越不容易切换模式（更稳定但反应慢）

    # --------------------------------------------------------------------------
    # 敌人检测参数
    # --------------------------------------------------------------------------
    enemy_visible_timeout: 1.0      # 敌人可见超时（秒）
                                    # 超过此时间没收到敌人数据 → 视为敌人消失

    # --------------------------------------------------------------------------
    # 血量参数
    # --------------------------------------------------------------------------
    low_hp_ratio: 0.35              # 低血量比例（血量低于 35% 视为危险）
    critical_hp_ratio: 0.20         # 极低血量比例（血量低于 20% 强制撤退）
    maximum_hp: 400.0               # 哨兵最大血量（需根据实际裁判系统配置）
    # 哨兵默认血量 400，如果有升级可调整

    # --------------------------------------------------------------------------
    # 攻击参数
    # --------------------------------------------------------------------------
    attack_distance_min: 1.5        # 最佳攻击距离下限（米）
    attack_distance_max: 5.0        # 最佳攻击距离上限（米）
                                    # 敌人在这两个值之间时，攻击评分加成

    # --------------------------------------------------------------------------
    # 伤害/撤退参数
    # --------------------------------------------------------------------------
    danger_damage_window: 3.0       # 伤害统计窗口（秒）
                                    # 统计最近 3 秒内的掉血总量
    damage_retreat_threshold: 160.0 # 伤害撤退阈值
                                    # 窗口内掉血超过 120 → 大幅增加撤退评分

    # --------------------------------------------------------------------------
    # 热量参数
    # --------------------------------------------------------------------------
    shooter_heat_limit: 70.0       # 枪口热量上限（需根据实际裁判系统配置）
                                    # 17mm 射速 10m/s 热量上限通常为 240

    # --------------------------------------------------------------------------
    # 敌人禁区（可选功能）
    # --------------------------------------------------------------------------
    enable_enemy_forbidden_sub: false  # 是否订阅敌人禁区检测结果
                                       # 设为 true 时需确保 /enemy_in_forbidden_area 话题可用

    # --------------------------------------------------------------------------
    # 各战术目标点坐标（map 坐标系，单位：米）
    # !!! 必须根据实际地图配置 !!!
    # --------------------------------------------------------------------------
    # 撤退目标点（通常是己方后方安全区域）
    retreat_goal_x: 0.0
    retreat_goal_y: 0.0

    # 补给目标点（补给站位置）
    supply_goal_x: 0.0
    supply_goal_y: 0.0

    # 防守目标点（己方基地位置）
    defend_goal_x: 0.0
    defend_goal_y: 0.0

    # 巡逻目标点（巡逻路径上的某个点）
    patrol_goal_x: 0.0
    patrol_goal_y: 0.0

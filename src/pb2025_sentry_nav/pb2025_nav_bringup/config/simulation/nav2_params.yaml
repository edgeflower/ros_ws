terrain_analysis_node:
  ros__parameters:
    sensor_frame: "front_mid360"
    scan_voxel_size: 0.05               # 点云下采样
    decay_time: 0.5                     # 点云时间差阈值 大于则不会被处理
    no_decay_dis: 0.0                   # 点云距离阈值 小于该阈值不考虑时间差
    clearing_dis: 0.0                   # 该距离外的点会被清除
    use_sorting: True                   # 这个参数开起来就能上坡了；如果 use_sorting,那么就以周围点中的分位点作为地面点，否则以最低点作为地面点；周围其余点相对于地面点的高度作为通过代价，所以对于坡面，有的点的代价是正，有的是负，就相互抵消了；不要与 consider_drop 同时开启，计算上会有冲突
    quantile_z: 0.2                     # useful if use_sorting is enabled.
    consider_drop: False                # 考虑凹下去的地面,开启则将相对于地面点的高度取绝对值
    limit_ground_lift: False            # useful if use_sorting is enabled
    max_ground_lift: 0.3                # useful if use_sorting is enabled
    clear_dy_obs: True                  # 清除动态物体的话，有动态物体走过的地方就走不了了
    min_dy_obs_dis: 0.3                 # 以下参数都是在 clear_dy_obs 的情况下才有用的
    min_dy_obs_angle: 0.0
    min_dy_obs_rel_z: -0.3
    abs_dy_obs_rel_z_thre: 0.2
    min_dy_obs_vfov: -28.0
    max_dy_obs_vfov: 33.0
    min_dy_obs_point_num: 1
    no_data_obstacle: False             # treat no data as obstacle
    no_data_block_skip_num: 0
    min_block_point_num: 10
    vehicle_height: 0.5                 # 小于车辆高度的点才会进行处理
    voxel_point_update_thre: 100
    voxel_time_update_thre: 1.0
    min_rel_z: -1.5                     # min_rel_z 以及 max_rel_z 限制了有效点云点的Z值范围，用于对天花板和地板进行处理
    max_rel_z: 0.5
    dis_ratio_z: 0.2                    # Z 值的最大最小范围由这两个值决定，但是并不等于这两个值，是有一个比例关系的，距离机器人越远，限定范围就越大，这其中考虑了坡度
    slope_angle_pub: 10.0               # 坡度阈值，超过此判定为坡 单位为 °
    
terrain_analysis:
  ros__parameters:

    use_sim_time: false                 # 是否使用仿真时间（Gazebo仿真用true，实车一般false）
    odometry_topic: "lidar_odometry"  # 里程计话题名称，实车可能是 "lidar_odometry" 或其他
    laser_cloud_topic: "registered_scan"  # 点云话题名称，实车可能是 "cloud_registered" 或其他

    # ---------- 点云预处理 ----------
    scanVoxelSize: 0.05                # 点云体素下采样尺寸（单位m），越小越精细但计算量越大

    decayTime: 0.5                     # 点云最大保留时间（秒），超过该时间的点会被丢弃
    noDecayDis: 1.5                    # 小于该距离的点不受decayTime限制（0表示全部受时间限制）
    nearDecayTime: 2.0                 # 小于noDecayDis但大于0的点的衰减时间（单位秒）
    clearingDis: 6.0                   # 超过该距离的点会被清除（0表示不清除远点）

    # ---------- 地面建模方式 ----------
    useSorting: True                   # 是否使用分位数地面估计
                                       # True：使用分位数作为地面点（推荐，上坡更稳定）
                                       # False：使用最低点作为地面（对坡面不友好）

    quantileZ: 0.2                     # 分位数参数（useSorting=true时生效）
                                       # 0.2表示取20%分位高度作为地面点

    considerDrop: False                # 是否考虑凹陷地形（将相对高度取绝对值）
                                       # ⚠ 不要与useSorting同时开启，会冲突

    limitGroundLift: False             # 是否限制地面抬升
    maxGroundLift: 0.3                 # 地面最大允许抬升高度（单位m）

    # ---------- 动态物体清除 ----------
    clearDyObs: False                  # 是否清除动态物体
                                       # ⚠ 比赛时一般关闭，否则动态物体走过会留下不可通行区域

    minDyObsDis: 0.3                   # 动态物体最小检测距离（clearDyObs=true时生效）
    minDyObsAngle: 0.0                 # 动态物体角度阈值
    minDyObsRelZ: -0.3                 # 动态物体最小相对高度
    absDyObsRelZThre: 0.2              # 动态物体绝对高度阈值
    minDyObsVFOV: -28.0                # 动态物体垂直视场下界
    maxDyObsVFOV: 33.0                 # 动态物体垂直视场上界
    minDyObsPointNum: 1                # 判定为动态物体所需最少点数

    # ---------- 无数据处理 ----------
    noDataObstacle: False              # 是否将无数据区域视为障碍（True更保守）
    noDataBlockSkipNum: 0              # 无数据块跳过数量
    minBlockPointNum: 25               # 每个体素块最少点数要求

    # ---------- 车辆高度过滤 ----------
    vehicleHeight: 1.5                 # 仅处理低于车辆高度的点（过滤天花板）

    # ---------- 体素更新机制 ----------
    voxelPointUpdateThre: 100          # 单体素更新所需最少点数
    voxelTimeUpdateThre: 1.0           # 单体素强制更新时间阈值（秒）

    # ---------- 相对高度范围 ----------
    minRelZ: -1.5                      # 相对地面最小有效高度（过滤地板反射）
    maxRelZ: 1.5                       # 相对地面最大有效高度（过滤天花板）

    disRatioZ: 0.4                     # 随距离增长的Z范围比例
                                       # 距离越远，允许的高度范围越大（考虑坡度）


terrain_analysis_ext:
  ros__parameters:

    use_sim_time: True                 # 是否使用仿真时间
    odometry_topic: "lidar_odometry"         # 里程计话题名称，实车可能是 "lidar_odometry" 或其他
    laser_cloud_topic: "registered_scan"  # 点云话题名称，实车可能是 "cloud_registered" 或其他

    scanVoxelSize: 0.1                 # 远场点云下采样尺寸（更粗，降低计算量）
    decayTime: 1.0                     # 点云保留时间（远场刷新更慢）
    noDecayDis: 0.0                    # 不受时间衰减限制的距离
    clearingDis: 15.0                  # 超过15米的点会被清除（控制地图大小）

    useSorting: true                   # 使用分位数地面建模
    quantileZ: 0.2                     # 分位数参数

    vehicleHeight: 1.5                 # 车辆高度过滤（远场略放宽）

    voxelPointUpdateThre: 50          # 体素更新最小点数
    voxelTimeUpdateThre: 1.0           # 体素更新时间阈值（远场更慢）

    lowerBoundZ: -1.5                  # 有效点云Z下界
    upperBoundZ: 1.5                   # 有效点云Z上界

    disRatioZ: 0.2                     # 随距离增长的Z比例（远场更保守）

    # ---------- 地形连通性检测 ----------
    checkTerrainConn: False            # 是否检测地形连通性

    terrainUnderVehicle: -1.0         # 车辆下方地形参考高度
    terrainConnThre: 0.5               # 地形连通阈值（高度差）

    # ---------- 天花板过滤 ----------
    ceilingFilteringThre: 2.0          # 超过该高度的点直接过滤

    # ---------- 局部地图大小 ----------
    localTerrainMapRadius: 5.0         # 局部地形地图半径（单位m）



